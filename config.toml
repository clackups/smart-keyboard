[input.keyboard]
# Linux evdev scan codes (hexadecimal, linux/input-event-codes.h)
navigate_up    = 0x67   # KEY_UP
navigate_down  = 0x6c   # KEY_DOWN
navigate_left  = 0x69   # KEY_LEFT
navigate_right = 0x6a   # KEY_RIGHT
activate       = 0x39   # KEY_SPACE

[input.gamepad]
enabled = true
device  = "auto"        # Auto-detect first connected gamepad
# Gamepad button codes (numeric, hexadecimal); comment out or remove to disable
# navigate_up    = 0x00
# navigate_down  = 0x01
# navigate_left  = 0x02
# navigate_right = 0x03
activate       = 0x05   # A/South button; comment out or remove to disable
# Analog stick / axis navigation; comment out or remove to disable
# axis_navigate_horizontal = 0    # axis index: negative = Left, positive = Right
# axis_navigate_vertical   = 1    # axis index: negative = Up,   positive = Down
# axis_threshold            = 16384  # minimum |value| to register (0–32767)
axis_activate             = 0x05  # axis index for Activate (positive only); comment out or remove to disable
# When absolute_axes = true the raw horizontal/vertical axis values are mapped
# directly to keyboard positions rather than being treated as directional inputs.
# The full axis range (−32767 … +32767) is divided evenly across the available
# rows / columns.  Useful with touchpad-style controllers.
# absolute_axes = false
# When rumble = true, a short force-feedback rumble is sent to the gamepad on
# every change of the keyboard navigation selection.
# rumble = false
# Duration of the rumble effect in milliseconds (default: 50).
# rumble_duration_ms = 50
# Intensity of both rumble motors: 0 = silent, 65535 = maximum (default: 16384 = 0x4000 ≈ 25 %).
# rumble_magnitude = 16384

[output]
# Output mode: "print" | "ble"
#   print – print key events to stdout (default; no hardware output)
#   ble   – send keyboard HID reports to the BLE dongle (esp_hid_serial_bridge)
mode = "print"

[output.ble]
# USB Vendor ID and Product ID of the BLE dongle (esp_hid_serial_bridge).
# These are the defaults; change them only if you have a custom firmware.
vid = 0x1209
pid = 0xbbd1
# Uncomment and set `serial` to select a specific dongle when multiple
# matching USB devices are connected:
# serial = "your_dongle_serial_string"
