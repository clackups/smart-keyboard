[input.keyboard]
# FLTK key codes, as printed by the [keyboard] debug output (hexadecimal).
# On Linux these are X11 KeySym values; for printable characters they equal
# the lowercase ASCII code (e.g. 'c' = 0x63, 'm' = 0x6d, space = 0x20).
navigate_up    = 0xff52   # Key::Up
navigate_down  = 0xff54   # Key::Down
navigate_left  = 0xff51   # Key::Left
navigate_right = 0xff53   # Key::Right
activate       = 0x20     # Space
menu           = 0x6d     # 'm'
# activate_shift = null  # equivalent to activate when Shift is held; null/absent = disabled
# activate_ctrl  = null  # equivalent to activate when Ctrl is held; null/absent = disabled
# activate_alt   = null  # equivalent to activate when Alt is held; null/absent = disabled
# activate_altgr = null  # equivalent to activate when AltGr is held; null/absent = disabled
# activate_enter = null  # produces the Enter output regardless of selection; null/absent = disabled
# activate_space = null  # produces the Space output regardless of selection; null/absent = disabled
# navigate_center = null # moves selection to center of keyboard; null/absent = disabled
# Example: navigate_center = 0x63  # 'c'

[input.gamepad]
enabled = true
device  = "auto"        # Auto-detect first connected gamepad
# Gamepad button codes (numeric, hexadecimal); comment out or remove to disable
# navigate_up    = 0x00
# navigate_down  = 0x01
# navigate_left  = 0x02
# navigate_right = 0x03
activate       = 0x05   # A/South button; comment out or remove to disable
menu           = 0x08   # Menu/Start button; comment out or remove to disable
# activate_shift = null   # equivalent to activate when Shift is held; null/absent = disabled
# activate_ctrl  = null   # equivalent to activate when Ctrl is held; null/absent = disabled
# activate_alt   = null   # equivalent to activate when Alt is held; null/absent = disabled
# activate_altgr = null   # equivalent to activate when AltGr is held; null/absent = disabled
# activate_enter = null   # produces the Enter output regardless of selection; null/absent = disabled
# activate_space = null   # produces the Space output regardless of selection; null/absent = disabled
# navigate_center = null  # moves selection to center of keyboard; null/absent = disabled
# Analog stick / axis navigation; comment out or remove to disable
# axis_navigate_horizontal = 0    # axis index: negative = Left, positive = Right
# axis_navigate_vertical   = 1    # axis index: negative = Up,   positive = Down
# axis_threshold            = 16384  # minimum |value| to register (0-32767)
axis_activate             = 0x05  # axis index for Activate (positive only); comment out or remove to disable
# axis_menu                 = null   # axis index for Menu (positive only); comment out or remove to disable
# When absolute_axes = true the raw horizontal/vertical axis values are mapped
# directly to keyboard positions rather than being treated as directional inputs.
# The full axis range (-32767 ... +32767) is divided evenly across the available
# rows / columns.  Useful with touchpad-style controllers.
# absolute_axes = false
# When rumble = true, a short force-feedback rumble is sent to the gamepad on
# every change of the keyboard navigation selection.
# rumble = false
# Duration of the rumble effect in milliseconds (default: 50).
# rumble_duration_ms = 50
# Intensity of both rumble motors: 0 = silent, 65535 = maximum (default: 16384 = 0x4000 ~= 25 %).
# rumble_magnitude = 16384

[input.gpio]
# GPIO input is disabled by default.  Set enabled = true to activate it.
enabled = false
# Path to the GPIO chip character device.  Default: "/dev/gpiochip0".
# chip = "/dev/gpiochip0"
# GPIO line numbers (numeric, decimal or hexadecimal); null/absent = disabled.
# navigate_up    = null
# navigate_down  = null
# navigate_left  = null
# navigate_right = null
# activate       = null
# menu           = null
# activate_shift = null   # equivalent to activate when Shift is held; null/absent = disabled
# activate_ctrl  = null   # equivalent to activate when Ctrl is held; null/absent = disabled
# activate_alt   = null   # equivalent to activate when Alt is held; null/absent = disabled
# activate_altgr = null   # equivalent to activate when AltGr is held; null/absent = disabled
# activate_enter = null   # produces the Enter output regardless of selection; null/absent = disabled
# activate_space = null   # produces the Space output regardless of selection; null/absent = disabled
# navigate_center = null  # moves selection to center of keyboard; null/absent = disabled
# Which GPIO signal level means "pressed": "high" or "low" (default: "low").
# A low signal is typical when using a pull-up resistor and a button that pulls
# the line to ground on press.
# gpio_signal = "low"
# Internal pull-resistor configuration applied to all configured GPIO lines.
# "up"   - enable internal pull-up resistor
# "down" - enable internal pull-down resistor
# "null" - no internal pull resistor (floating; default)
# Requires Linux kernel >= 5.5.  On older kernels the setting is ignored.
# gpio_pull = "null"


# When rollover = true, navigation wraps around at the edges of the keyboard:
# moving left past the first column brings the cursor to the last column of the
# same row, and vice-versa; moving down past the last row brings the cursor back
# to the first row (or the language strip if present), and vice-versa.
# rollover = false

# The key label used as the center reference point (default: "h").
#   navigate_center action - moves the selection to this button.
#   absolute_axes mode     - the joystick's neutral position (axis centre) maps
#                            to this button instead of the physical grid centre.
center_key = "h"

# When center_after_activate = true, the navigation selection jumps to the
# center button (defined by center_key) immediately after any activate action
# (including all activate_* variants).  Default: false.
# center_after_activate = false

[output]
# Output mode: "print" | "ble"
#   print - print key events to stdout (default; no hardware output)
#   ble   - send keyboard HID reports to the BLE dongle (esp_hid_serial_bridge)
mode = "print"
# Audio feedback on keyboard-navigation selection changes.
#   "none"       - silent (default)
#   "narrate"    - play a WAV clip naming each button; clips are loaded from the
#                  `audio/` sub-directory of the current working directory, or
#                  from the path given by the SMART_KBD_AUDIO_PATH environment
#                  variable.
#   "tone"       - play a short musical tone that varies by key category:
#                  letter/punctuation keys share one pitch; F and J have a
#                  distinctive pitch; digit keys 1-0 play an ascending scale;
#                  function keys F1-F12 play a lower ascending scale; each
#                  special key (Space, Enter, arrows, ...) has its own tone.
#   "tone_hint"  - like "tone" but all letter and punctuation keys are silent
#                  except for F and J (the physical home-row bump keys), which
#                  play a distinctive tone.  Digit keys and special keys still
#                  play their tones as in "tone" mode.
# audio = "none"

[output.ble]
# USB Vendor ID and Product ID of the BLE dongle (esp_hid_serial_bridge).
# These are the defaults; change them only if you have a custom firmware.
vid = 0x1209
pid = 0xbbd1
# Uncomment and set `serial` to select a specific dongle when multiple
# matching USB devices are connected:
# serial = "your_dongle_serial_string"

[ui.colors]
# All colour values are 6-digit hex strings ("#RRGGBB").
# Remove or comment out any line to restore the built-in default.

# Regular key (letter / digit / symbol / Space) button background.
# key_normal            = "#dadade"
# Modifier / function / navigation key button background (inactive).
# key_mod               = "#64646e"
# Active modifier and selected language button background (steel-blue).
# mod_active            = "#4682b4"
# Keyboard-navigation cursor highlight.
# nav_sel               = "#ffc800"

# Status bar background strip.
# status_bar_bg         = "#19191c"
# Inactive modifier-pill background.
# status_ind_bg         = "#2d2d32"
# Inactive modifier-pill label colour.
# status_ind_text       = "#5a5a5f"
# Active modifier-pill label colour.
# status_ind_active_text = "#ffffff"

# BLE / gamepad icon: disconnected state (red).
# conn_disconnected     = "#dc3c3c"
# BLE icon: connecting state - dongle found, host not yet paired (amber).
# conn_connecting       = "#dc9628"
# BLE / gamepad icon: connected state (green).
# conn_connected        = "#50dc50"

# Window / keyboard area background.
# win_bg                = "#28282b"
# Text display background.
# disp_bg               = "#1c1c1c"
# Text display foreground (typed characters).
# disp_text             = "#b4ffb4"

# Language button background when not the active layout.
# lang_btn_inactive     = "#505050"
# Language button label colour.
# lang_btn_label        = "#ffffff"

# Text label colour on regular keys (dark text on light background).
# key_label_normal      = "#141414"
# Text label colour on modifier / function keys (light text on dark background).
# key_label_mod         = "#d2d2d2"
